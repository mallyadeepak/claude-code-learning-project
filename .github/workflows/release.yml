name: Release to Prod

# Runs when a version tag is pushed (e.g. git tag v1.2.3 && git push origin v1.2.3).
# The prod deployment job is gated by a manual approval rule configured
# on the "prod" GitHub Environment (Settings → Environments → prod).
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: build

    # Links this job to the "prod" GitHub Environment.
    # IMPORTANT: Go to Settings → Environments → prod and enable
    # "Required reviewers" — add yourself (or your team).
    # GitHub will pause here and send an approval request before
    # this job runs. The release is only published after approval.
    environment:
      name: prod
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish release to prod environment
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
